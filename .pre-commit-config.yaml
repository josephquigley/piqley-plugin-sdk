repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files

  - repo: local
    hooks:
      - id: kacl-verify
        name: kacl-verify
        entry: kacl-cli verify
        language: system
        files: CHANGELOG.md
        pass_filenames: false

      - id: changelog-check
        name: Changelog entry required
        entry: scripts/check-changelog.sh
        language: script
        pass_filenames: false
        stages: [pre-commit]
